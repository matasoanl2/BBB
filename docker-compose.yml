services:
  postgres:
    image: postgres:15-alpine
    container_name: bb-postgres
    command:
      - postgres
      - -c
      - max_connections=48
      - -c
      - shared_buffers=32MB
      - -c
      - effective_cache_size=96MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - work_mem=1MB
      - -c
      - wal_buffers=2MB
      - -c
      - temp_buffers=1MB
      - -c
      - min_wal_size=32MB
      - -c
      - max_wal_size=128MB
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buybaybye
      TZ: ${TZ:-Europe/Moscow}
      PGTZ: ${TZ:-Europe/Moscow}
    cpus: "0.35"
    mem_limit: "256m"
    shm_size: "128mb"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb-collector
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      HEADLESS: "true"
      RUNTIME_ROLE: collector
      TZ: ${TZ:-Europe/Moscow}

    volumes:
      - ./strategies:/app/strategies:ro
    cpus: "0.80"
    mem_limit: "1024m"
    shm_size: "1gb"
    stdin_open: true
    tty: true

  bettor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb-bettor
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      HEADLESS: "true"
      RUNTIME_ROLE: bettor
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./profile_docker:/app/profile
      - ./strategies:/app/strategies:ro
    cpus: "0.80"
    mem_limit: "1024m"
    shm_size: "1gb"
    stdin_open: true
    tty: true

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: bb-dashboard
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      TZ: ${TZ:-Europe/Moscow}
    cpus: "0.30"
    mem_limit: "256m"
    command: ["uvicorn", "dashboard:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
