services:
  postgres:
    image: postgres:15-alpine
    container_name: bb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buybaybye
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb-collector
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      HEADLESS: "true"
      RUNTIME_ROLE: collector

    volumes:
      - ./strategies:/app/strategies:ro
    shm_size: "1gb"
    stdin_open: true
    tty: true

  bettor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb-bettor
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      HEADLESS: "true"
      RUNTIME_ROLE: bettor
    volumes:
      - ./profile_docker:/app/profile
      - ./strategies:/app/strategies:ro
    shm_size: "1gb"
    stdin_open: true
    tty: true

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb-dashboard
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
    command: ["uvicorn", "dashboard:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
