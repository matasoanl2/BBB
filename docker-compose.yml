services:
  postgres:
    image: postgres:15-alpine
    container_name: bb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buybaybye
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb-patchright
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HEADLESS: "true"
      PYTHONUNBUFFERED: "1"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: buybaybye
    volumes:
      - ./profile:/app/profile
    shm_size: "1gb"
    stdin_open: true
    tty: true
